version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: otto-sr-db
    environment:
      POSTGRES_DB: ottosr
      POSTGRES_USER: ottosr_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ottosr_user -d ottosr"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - otto-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: otto-sr-backend
    environment:
      DATABASE_URL: postgresql://ottosr_user:${DB_PASSWORD:-secure_password}@postgres:5432/ottosr
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      USE_TRIPLE_LLM: ${USE_TRIPLE_LLM:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - otto-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: otto-sr-frontend
    environment:
      VITE_API_URL: http://backend:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - otto-network

  nginx:
    image: nginx:alpine
    container_name: otto-sr-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - otto-network

volumes:
  postgres_data:

networks:
  otto-network:
    driver: bridge